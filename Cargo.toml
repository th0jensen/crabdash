[package]
name = "crabdash"
version = "0.1.0"
edition = "2024"
description = "Crabdash desktop app built with GPUI"

[dependencies]
anyhow = { version= "1.0.102", features = ["std", "backtrace"] }
dirs = "6.0.0"
gpui = { version = "*" }
keyring = { version = "3.6.3", features = ["apple-native", "sync-secret-service", "crypto-rust"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
ssh2 = "0.9.5"
unicode-segmentation = "1.12.0"

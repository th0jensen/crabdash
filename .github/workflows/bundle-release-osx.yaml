name: Bundle and Release - macOS
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-bundle
        run: cargo install cargo-bundle
      - name: Build app bundle
        run: cargo bundle --release --format osx -p crabdash
      - name: Patch Tahoe icon assets
        run: |
          APP="target/release/bundle/osx/Crabdash.app"
          cp assets/icons/Assets.car "$APP/Contents/Resources/Assets.car"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$APP/Contents/Info.plist" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$APP/Contents/Info.plist"
      - name: Codesign app
        run: |
          APP="target/release/bundle/osx/Crabdash.app"
          codesign --deep --force --sign - "$APP"
      - name: Package DMG
        run: |
          APP="target/release/bundle/osx/Crabdash.app"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Crabdash" -srcfolder "$STAGE" -ov -format UDZO "crabdash-macOS-applesilicon.dmg"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: crabdash-macOS
          path: crabdash-macOS-applesilicon.dmg
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" crabdash-macOS-applesilicon.dmg --generate-notes
